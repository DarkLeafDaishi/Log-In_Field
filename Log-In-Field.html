<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="Log-In-Field_CSS.css">
</head>
<body>

<div class="container">
  <form id="loginForm" class="login-card">
          <!-- Clickable Login Image -->
    <div class="login-image-wrapper">
      <img src="C:\Users\Admin\Downloads\DLD_logo_under_1MB.jpg" id="loginImage" class="login-image" alt="Login Image">
    </div>

    <!-- Fullscreen Popup -->
    <div id="imagePopup" class="image-popup">
      <span id="closePopup">&times;</span>
      <img class="popup-content" id="popupImg">
    </div>
    <h2>Hey Buddy!</h2>
    <p class="subtitle">Login to continue</p>

    <div class="input-group">
      <input type="email" id="email" required>
      <label>Email</label>
      <span class="error" id="emailError"></span>
    </div>

    <div class="input-group">
      <input type="password" id="password" required>
      <label>Password</label>
      <span class="toggle" id="togglePassword">👁</span>
      <span class="error" id="passwordError"></span>
    </div>

    <button type="submit">Login</button>
    <p id="loginMessage"></p>
  </form>
</div>

<script src="Log-In-Field_JS.js"></script>
</body>
</html>
